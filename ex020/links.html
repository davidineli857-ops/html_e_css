<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>links</title>
    <style>
        body{
            font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;

        }
        a{
         color: brown;
         text-decoration: none;
         font-weight: bold;
        }
        a:visited{
            color: aqua;

        }
        a:hover{
            color: black;
            text-decoration: underline;
        }
        a:active{
            color:blue;
        }
        a::after{
            content: '[link]';
            color: gray;
        }

    </style>
</head>
<body>

    <h1>personalizando links</h1>
    <ul>
        <li><a href="https://gustavoguanabara.github.io">github</a></li>
        <li><a href="https://youtube.com/cursoemvideo/">canal do youtube</a></li>
        <li><a href="https://www.cursoemvideo.com" target="_blank">site do curso em video</a></li>
    </ul>
    
</body>
</html>
