<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela 2</title>
    <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }

    table {
        width: 400px ;
        border-collapse: collapse;
    }

    thead {
        background-color: gray;
        color: white;
    }

    td {
        border: 2px solid black;
        padding: 9px;
    }
         


    </style>
</head>
<body>
    <h1>uso de tabelas grandes</h1>
    <table>
       <thead>
        <tr>
            <td>ESTADO</td>
            <td>população</td>
           
        </tr>

       </thead>
       <tbody>
         <tr>
            <td>São Paulo</td>
            <td>46 081 801</td>
        </tr>
       </tbody>

       <tfoot>
         <tr>
            <td>total de habitantes</td>
            <td>40028922</td>
         </tr>
       </tfoot>

    </table>
    
</body>
</html>
