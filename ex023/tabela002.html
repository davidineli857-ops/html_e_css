<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela 2</title>
    <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }

    table {
        width: 400px ;
        border-collapse: collapse;
    }

    thead,tfoot {
        background-color: gray;
        color: white;
    }

    th,td {
         border: 2px solid black;
         padding: 10px;
    }
    




    </style>
</head>
<body>
    <h1>uso de tabelas grandes</h1>
    <table>
       <thead>
        <tr>
            <th>ESTADO</th>
            <th>população</th>
           
        </tr>

       </thead>
       <tbody>
         <tr>
            <td>São Paulo</td>
            <td>46 081 801</td>
        </tr>
        <tr>
            <td>Pará</td>
            <td>8 711 196</td>
        </tr>
        <tr>
            <td>Rio de Janeiro</td>
            <td>17 223 547</td>
        </tr>
       </tbody>

       <tfoot>
         <tr>
            <th>total de habitantes</th>
            <td>+ 71 000 000</td>
         </tr>
       </tfoot>

    </table>
    
</body>
</html>
