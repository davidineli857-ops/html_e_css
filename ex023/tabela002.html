<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela 2</title>
    <style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }

    table {
        width: 500px ;
        border-collapse: collapse;
    }

    thead,tfoot {
        background-color: gray;
        color: white;
    }

    th,td {
         border: 2px solid black;
         padding: 9px;
    }
    tbody tr:nth-child(odd) {
        background-color: rgb(123, 150, 141);
        
    }

    tbody tr:nth-child(even) {
        background-color: lightgray;

    }

    caption {
        font-size: 20px ;
        background-color: black;
        color: white;
        padding: 15px;

    }
    

    </style>
</head>
<body>
    <h1>uso de tabelas grandes</h1>
    <table>
        <caption>população das unidades federativas</caption>
       <thead>
        <tr>
            <th scope="col">ESTADO</th>
            <th scope="col" style="width: 150px;">população</th>
           
        </tr>

       </thead>
       <tbody>
         <tr>
            <td>São Paulo</td>
            <td>46 081 801</td>
        </tr>
        <tr>
            <td>Pará</td>
            <td>8 711 196</td>
        </tr>
        <tr>
            <td>Rio de Janeiro</td>
            <td>17 223 547</td>
        </tr>
        <tr>
            <td>Minas Gerais</td>
            <td>21 393 441</td>
        </tr>
        <tr>
            <td>Ceará</td>
            <td>9 268 836</td>
        </tr>
        <tr>
            <td>Roraima</td>
            <td>738 772</td>
        </tr>
         <tr>
            <td>Acre</td>
            <td>882 372</td>
        </tr>
         <tr>
            <td>Amazonas</td>
            <td>4 321 616</td>
        </tr>
       </tbody>

       <tfoot>
         <tr>
            <th>total de habitantes</th>
            <td><strong>+ 71 000 000</strong></td>
         </tr>
       </tfoot>

    </table>
    
</body>
</html>
