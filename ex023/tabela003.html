<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela 3</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 400px;
        }

        td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    
    <h1>mesclagem de células</h1>
    <table>
       <tr>
           <td colspan="2">A</td>
           <td rowspan="2">B</td>
       </tr>
        <tr>
           <td>C</td>
           <td>D</td>
       </tr>
        <tr>
           <td>F</td>
           <td>G</td>
           <td>I</td>
        <tr>
           <td>H</td>
           <td>I</td>
           <td>J</td>
       </tr>
      


    </table>
    
</body>
</html>
