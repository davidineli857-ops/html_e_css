<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    .capa {
     display: grid;
     grid-template-rows: 130px 50px;
     grid-template-columns: 1fr 2fr 1fr ;

    }

    .item1 {
       grid-row: 1/2;
       grid-column: 1/4 ;
       background-color: blue;
    }

    .item2 {
    grid-row: 2/3;
    grid-column: 1/4;
      background-color: brown;
    }



    .principal {
     display: grid;
     grid-template-rows: 300px 100px;
     grid-template-columns: 1fr 2fr 1fr ;
    
    }

    .item3 {
      grid-row: 1/3;
      grid-column: 1/3;
      background-color: green;
    }

    .item4 {
    grid-row: 1/3;
    grid-column: 3/4;
      background-color: aquamarine;
    }

    .creditos {
     display: grid;
     grid-template-rows: 100px;
     grid-template-columns: 1fr 2fr 1fr ;
    }

    .item5 {
    grid-row: 1/2 ;
    grid-column: 1/4 ;
    background-color: yellowgreen;


    }

    div {
        text-align: center;
        font-size: 30px;
    }

    </style>
</head>
<body>
    <header class="capa">
        <div class="item1">Topo</div>
        <div class="item2">Menu</div>
    </header>
    <main class="principal">
        <div class="item3">Principal</div>
        <div class="item4">Secundário</div>
    </main>
    <footer class="creditos">
        <div class="item5">Rodapé</div>
    </footer>
    
</body>
</html>
